name: Setup Build Environment
description: Setup .NET, Python, optional Python dependencies, and optional Java.

inputs:
  dotnet-version:
    description: .NET SDK version
    required: false
    default: 10.0.x
  python-version:
    description: Python version
    required: false
    default: "3.x"
  install-python-deps:
    description: Install python packages listed in python-packages
    required: false
    default: "true"
  python-packages:
    description: Space-separated pip packages to install
    required: false
    default: markdown
  install-java:
    description: Install Java SDK
    required: false
    default: "false"
  java-version:
    description: Java version when install-java is true
    required: false
    default: "21"

runs:
  using: composite
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Python dependencies
      if: inputs.install-python-deps == 'true'
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        $packages = '${{ inputs.python-packages }}'.Trim()
        if (-not [string]::IsNullOrWhiteSpace($packages)) {
          python -m pip install $packages
        }

    - name: Setup Java
      if: inputs.install-java == 'true'
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}
