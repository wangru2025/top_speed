name: Crowdin Sync

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: crowdin-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync With Crowdin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Crowdin Sync
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: true
          download_translations: true
          import_eq_suggestions: true
          skip_untranslated_strings: false
          skip_untranslated_files: false
          localization_branch_name: locale
          create_pull_request: true
          pull_request_base_branch_name: main
          pull_request_title: "Localization Update"
          pull_request_body: "Automated localization sync from Crowdin."
          pull_request_labels: "localization,l10n"
          commit_message: "Sync translations from Crowdin [skip ci]"
          crowdin_branch_name: main
          config: crowdin.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
