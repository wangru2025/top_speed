name: Locale Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main
      - master
  check_suite:
    types:
      - completed
  workflow_run:
    workflows:
      - Crowdin Sync
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  squash_merge_locale:
    name: Squash Merge Locale PR
    runs-on: ubuntu-latest
    steps:
      - name: Merge eligible locale PRs
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const expectedHeadBranch = "locale";
            const allowedBaseBranches = new Set(["main", "master"]);
            const prNumbers = new Set();

            if (context.eventName === "pull_request_target") {
              const pr = context.payload.pull_request;
              if (pr) {
                prNumbers.add(pr.number);
              }
            } else if (context.eventName === "workflow_run") {
              const prs = context.payload.workflow_run?.pull_requests || [];
              for (const pr of prs) {
                prNumbers.add(pr.number);
              }

              if (prNumbers.size === 0) {
                const { data: openPrs } = await github.rest.pulls.list({
                  owner,
                  repo,
                  state: "open",
                  per_page: 100
                });

                for (const pr of openPrs) {
                  if (pr.head?.ref === expectedHeadBranch) {
                    prNumbers.add(pr.number);
                  }
                }
              }
            } else if (context.eventName === "check_suite") {
              for (const pr of context.payload.check_suite?.pull_requests || []) {
                prNumbers.add(pr.number);
              }
            }

            if (prNumbers.size === 0) {
              core.info("No pull requests found for this event.");
              return;
            }

            for (const prNumber of prNumbers) {
              let pr;
              try {
                const response = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber
                });
                pr = response.data;
              } catch (error) {
                if (error.status === 404) {
                  core.info(`#${prNumber} is not found in ${owner}/${repo}. Skipping stale event reference.`);
                  continue;
                }

                throw error;
              }

              if (pr.state !== "open") {
                core.info(`#${prNumber} is not open. Skipping.`);
                continue;
              }

              if (pr.draft) {
                core.info(`#${prNumber} is draft. Skipping.`);
                continue;
              }

              if (!allowedBaseBranches.has(pr.base.ref)) {
                core.info(`#${prNumber} base branch '${pr.base.ref}' is not allowed. Skipping.`);
                continue;
              }

              if (pr.head.ref !== expectedHeadBranch) {
                core.info(`#${prNumber} head branch '${pr.head.ref}' is not '${expectedHeadBranch}'. Skipping.`);
                continue;
              }

              if (pr.head.repo?.full_name !== `${owner}/${repo}`) {
                core.info(`#${prNumber} head repo is external fork. Skipping.`);
                continue;
              }

              core.info(`Attempting squash merge for #${prNumber}.`);

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: prNumber,
                  merge_method: "squash"
                });
              } catch (error) {
                if ([405, 409, 422].includes(error.status)) {
                  core.info(`#${prNumber} is not mergeable yet (${error.status}). Will retry on future events.`);
                  continue;
                }

                throw error;
              }

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${expectedHeadBranch}`
                });
                core.info(`Deleted branch '${expectedHeadBranch}' after merging #${prNumber}.`);
              } catch (error) {
                if (error.status === 422 || error.status === 404) {
                  core.info(`Branch '${expectedHeadBranch}' already deleted or unavailable.`);
                } else {
                  throw error;
                }
              }
            }
