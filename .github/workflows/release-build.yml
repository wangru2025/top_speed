name: Release Build

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_info.outputs.version }}
      server_version: ${{ steps.release_info.outputs.server_version }}
      game_zip_win: ${{ steps.release_info.outputs.game_zip_win }}
      game_zip_linux: ${{ steps.release_info.outputs.game_zip_linux }}
      game_zip_osx: ${{ steps.release_info.outputs.game_zip_osx }}
      game_apk_android: ${{ steps.release_info.outputs.game_apk_android }}
      android_version_code: ${{ steps.release_info.outputs.android_version_code }}
      game_zip_glob: ${{ steps.release_info.outputs.game_zip_glob }}
      server_zip_glob: ${{ steps.release_info.outputs.server_zip_glob }}
      changes_md: ${{ steps.release_info.outputs.changes_md }}
      server_changes_md: ${{ steps.release_info.outputs.server_changes_md }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Read Release Info
      id: release_info
      shell: pwsh
      run: |
        $infoPath = Join-Path $env:GITHUB_WORKSPACE "info.json"
        if (-not (Test-Path $infoPath)) {
          throw "info.json was not found at repository root."
        }

        $info = Get-Content $infoPath -Raw | ConvertFrom-Json
        if ($null -eq $info.version -or [string]::IsNullOrWhiteSpace([string]$info.version)) {
          throw "info.json is missing a valid 'version' value."
        }
        if ($null -eq $info.serverVersion -or [string]::IsNullOrWhiteSpace([string]$info.serverVersion)) {
          throw "info.json is missing a valid 'serverVersion' value."
        }

        $version = ([string]$info.version).Trim()
        $serverVersion = ([string]$info.serverVersion).Trim()
        if ($version -notmatch '^\d{4}\.\d{1,2}\.\d{1,2}\.\d{1,3}$') {
          throw "info.json version '$version' is invalid. Expected format: YYYY.M.D.R"
        }
        if ($serverVersion -notmatch '^\d{4}\.\d{1,2}\.\d{1,2}\.\d{1,3}$') {
          throw "info.json serverVersion '$serverVersion' is invalid. Expected format: YYYY.M.D.R"
        }

        $versionParts = $version.Split('.')
        $androidVersionCode =
          ([int]$versionParts[0] * 1000000) +
          ([int]$versionParts[1] * 10000) +
          ([int]$versionParts[2] * 100) +
          [int]$versionParts[3]

        $changes = @()
        if ($null -ne $info.changes) {
          foreach ($change in $info.changes) {
            $line = [string]$change
            if (-not [string]::IsNullOrWhiteSpace($line)) {
              $changes += "* $($line.Trim())"
            }
          }
        }
        if ($changes.Count -eq 0) {
          $changes += "* No listed game changes."
        }

        $serverChanges = @()
        if ($null -ne $info.serverChanges) {
          foreach ($change in $info.serverChanges) {
            $line = [string]$change
            if (-not [string]::IsNullOrWhiteSpace($line)) {
              $serverChanges += "* $($line.Trim())"
            }
          }
        }
        if ($serverChanges.Count -eq 0) {
          $serverChanges += "* No listed server changes."
        }

        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "server_version=$serverVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "game_zip_win=TopSpeed-windows-x64-Release-v-$version.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "game_zip_linux=TopSpeed-linux-x64-Release-v-$version.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "game_zip_osx=TopSpeed-mac-x64-Release-v-$version.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "game_apk_android=TopSpeed-android-arm64-Release-v-$version.apk" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "android_version_code=$androidVersionCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "game_zip_glob=TopSpeed-*-Release-v-$version.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "server_zip_glob=TopSpeed.Server-*-Release-v-$serverVersion.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "changes_md<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        $changes | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "server_changes_md<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        $serverChanges | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  build_windows:
    name: Build Windows
    needs: metadata
    runs-on: windows-latest
    defaults:
      run:
        working-directory: top_speed_net
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        python -m pip install markdown

    - name: Restore Windows build dependencies
      shell: pwsh
      run: |
        dotnet restore TopSpeed.Tests/TopSpeed.Tests.csproj
        dotnet restore TopSpeed.Server/TopSpeed.Server.csproj
        dotnet restore TopSpeed/TopSpeed.csproj

    - name: Build shared tests (net10.0)
      run: dotnet build TopSpeed.Tests/TopSpeed.Tests.csproj --configuration Release --framework net10.0 --no-restore

    - name: Run shared tests (net10.0)
      run: dotnet test TopSpeed.Tests/TopSpeed.Tests.csproj --configuration Release --framework net10.0 --no-build --verbosity normal

    - name: Publish Windows server
      run: dotnet publish TopSpeed.Server/TopSpeed.Server.csproj --configuration Release -p:ServerPublishProfile=ReleaseWinX64

    - name: Build Windows client
      run: dotnet build TopSpeed/TopSpeed.csproj --configuration Release --framework net10.0-windows --runtime win-x64 --no-restore

    - name: Create Windows archives
      shell: pwsh
      run: |
        $gameZip = "${{ needs.metadata.outputs.game_zip_win }}"
        $serverZip = "TopSpeed.Server-win-x64-Release-v-${{ needs.metadata.outputs.server_version }}.zip"

        if (Test-Path $gameZip) { Remove-Item $gameZip -Force }
        if (Test-Path $serverZip) { Remove-Item $serverZip -Force }

        Compress-Archive -Path "TopSpeed\bin\Release\net10.0\win-x64\*" -DestinationPath $gameZip -CompressionLevel Optimal
        Compress-Archive -Path "TopSpeed.Server\bin\Publish\win-x64\*" -DestinationPath $serverZip -CompressionLevel Optimal

    - name: Verify Windows archives
      shell: pwsh
      run: |
        $gameZip = "${{ needs.metadata.outputs.game_zip_win }}"
        $serverZip = "TopSpeed.Server-win-x64-Release-v-${{ needs.metadata.outputs.server_version }}.zip"

        if (-not (Test-Path $gameZip)) {
          throw "Missing Windows client archive: $gameZip"
        }

        if (-not (Test-Path $serverZip)) {
          throw "Missing Windows server archive: $serverZip"
        }

        Get-Item $gameZip, $serverZip | Select-Object Name, Length

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-assets-windows
        if-no-files-found: error
        path: |
          top_speed_net/${{ needs.metadata.outputs.game_zip_win }}
          top_speed_net/TopSpeed.Server-win-x64-Release-v-${{ needs.metadata.outputs.server_version }}.zip

  build_linux:
    name: Build Linux
    needs: metadata
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: top_speed_net
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install markdown

    # - name: Install NativeAOT toolchains
    #   run: |
    #     sudo dpkg --add-architecture arm64
    #     # Retry apt-get update up to 3 times with 5-second delays
    #     for attempt in {1..3}; do
    #       echo "Attempt $attempt of apt-get update..."
    #       if sudo apt-get update; then
    #         break
    #       fi
    #       if [ $attempt -lt 3 ]; then
    #         echo "Update failed, waiting 5 seconds before retry..."
    #         sleep 5
    #       else
    #         echo "Failed after 3 attempts"
    #         exit 1
    #       fi
    #     done
    #     sudo apt-get install -y clang llvm zlib1g-dev binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu zlib1g-dev:arm64

    - name: Run shared tests
      run: dotnet test TopSpeed.Tests/TopSpeed.Tests.csproj --configuration Release --framework net10.0 --verbosity normal

    - name: Publish Linux servers
      shell: bash
      run: |
        set -euo pipefail
        dotnet publish TopSpeed.Server/TopSpeed.Server.csproj --configuration Release -p:ServerPublishProfile=ReleaseLinuxX64 -p:UseTrimmedUpdater=true
        dotnet publish TopSpeed.Server/TopSpeed.Server.csproj --configuration Release -p:ServerPublishProfile=ReleaseLinuxArm64 -p:UseTrimmedUpdater=true

        profiles=(
          ReleaseLinuxArm32
          ReleaseLinuxMuslX64
          ReleaseLinuxMuslArm64
        )

        for profile in "${profiles[@]}"; do
          dotnet publish TopSpeed.Server/TopSpeed.Server.csproj --configuration Release -p:ServerPublishProfile="$profile" -p:UseTrimmedUpdater=true
        done

        dotnet publish TopSpeed.Server/TopSpeed.Server.csproj --configuration Release -p:ServerPublishProfile=ReleaseLinuxX86FrameworkDependent

    - name: Build Linux client
      run: dotnet build TopSpeed/TopSpeed.csproj --configuration Release -p:RuntimeIdentifier=linux-x64 -p:UseTrimmedUpdater=true

    - name: Create Linux archives
      shell: bash
      run: |
        set -euo pipefail

        game_zip="${{ needs.metadata.outputs.game_zip_linux }}"
        rm -f "$game_zip"
        (
          cd TopSpeed/bin/Release/net10.0/linux-x64
          zip -rq "$GITHUB_WORKSPACE/top_speed_net/$game_zip" .
        )

        server_version="${{ needs.metadata.outputs.server_version }}"
        targets=(
          linux-x64
          linux-arm64
          linux-arm32
          linux-musl-x64
          linux-musl-arm64
          linux-x86-fdd
        )

        for rid in "${targets[@]}"; do
          destination="$GITHUB_WORKSPACE/top_speed_net/TopSpeed.Server-$rid-Release-v-$server_version.zip"
          rm -f "$destination"
          (
            cd "TopSpeed.Server/bin/Publish/$rid"
            zip -rq "$destination" .
          )
        done

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-assets-linux
        if-no-files-found: error
        path: |
          top_speed_net/${{ needs.metadata.outputs.game_zip_linux }}
          top_speed_net/TopSpeed.Server-linux-x64-Release-v-${{ needs.metadata.outputs.server_version }}.zip
          top_speed_net/TopSpeed.Server-linux-arm64-Release-v-${{ needs.metadata.outputs.server_version }}.zip
          top_speed_net/TopSpeed.Server-linux-arm32-Release-v-${{ needs.metadata.outputs.server_version }}.zip
          top_speed_net/TopSpeed.Server-linux-musl-x64-Release-v-${{ needs.metadata.outputs.server_version }}.zip
          top_speed_net/TopSpeed.Server-linux-musl-arm64-Release-v-${{ needs.metadata.outputs.server_version }}.zip
          top_speed_net/TopSpeed.Server-linux-x86-fdd-Release-v-${{ needs.metadata.outputs.server_version }}.zip

  build_macos:
    name: Build macOS
    needs: metadata
    runs-on: macos-latest
    defaults:
      run:
        working-directory: top_speed_net
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install markdown

    - name: Run shared tests (net10.0)
      run: dotnet test TopSpeed.Tests/TopSpeed.Tests.csproj --configuration Release --framework net10.0 --verbosity normal

    - name: Publish macOS client
      run: dotnet publish TopSpeed/TopSpeed.csproj --configuration Release -p:RuntimeIdentifier=osx-x64 -p:UseNativeAotUpdater=true

    - name: Publish macOS server
      run: dotnet publish TopSpeed.Server/TopSpeed.Server.csproj --configuration Release -p:ServerPublishProfile=ReleaseMacX64 -p:UseNativeAotUpdater=true

    - name: Create macOS archives
      shell: bash
      run: |
        set -euo pipefail
        game_zip="${{ needs.metadata.outputs.game_zip_osx }}"
        server_zip="TopSpeed.Server-mac-x64-Release-v-${{ needs.metadata.outputs.server_version }}.zip"
        rm -f "$game_zip"
        rm -f "$server_zip"
        (
          cd TopSpeed/bin/Publish/osx-x64
          ditto -c -k --sequesterRsrc --keepParent TopSpeed.app "$GITHUB_WORKSPACE/top_speed_net/$game_zip"
        )
        (
          cd TopSpeed.Server/bin/Publish/mac-x64
          zip -rq "$GITHUB_WORKSPACE/top_speed_net/$server_zip" .
        )

    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-assets-macos
        if-no-files-found: error
        path: |
          top_speed_net/${{ needs.metadata.outputs.game_zip_osx }}
          top_speed_net/TopSpeed.Server-mac-x64-Release-v-${{ needs.metadata.outputs.server_version }}.zip

  build_android:
    name: Build Android
    needs: metadata
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: top_speed_net
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install markdown

    - name: Install Android workload
      run: dotnet workload install android

    - name: Restore Android project
      run: dotnet restore TopSpeed.Android/TopSpeed.Android.csproj

    - name: Publish Android APK
      shell: bash
      run: |
        set -euo pipefail
        dotnet publish TopSpeed.Android/TopSpeed.Android.csproj \
          --configuration Release \
          --framework net10.0-android \
          --runtime android-arm64 \
          -p:AndroidPackageFormat=apk \
          -p:ApplicationDisplayVersion="${{ needs.metadata.outputs.version }}" \
          -p:ApplicationVersion="${{ needs.metadata.outputs.android_version_code }}"

    - name: Stage Android APK
      shell: bash
      run: |
        set -euo pipefail
        apk_name="${{ needs.metadata.outputs.game_apk_android }}"
        apk_path="$(find TopSpeed.Android/bin/Release/net10.0-android -type f -name '*Signed.apk' | sort | head -n 1)"
        if [ -z "$apk_path" ]; then
          apk_path="$(find TopSpeed.Android/bin/Release/net10.0-android -type f -name '*.apk' ! -name '*unaligned*' | sort | head -n 1)"
        fi
        if [ -z "$apk_path" ]; then
          echo "No Android APK was produced."
          find TopSpeed.Android/bin/Release/net10.0-android -type f | sort || true
          exit 1
        fi

        cp "$apk_path" "$apk_name"
        ls -lh "$apk_name"

    - name: Upload Android artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-assets-android
        if-no-files-found: error
        path: top_speed_net/${{ needs.metadata.outputs.game_apk_android }}

  release:
    name: Publish Release
    needs:
      - metadata
      - build_windows
      - build_linux
      - build_macos
      - build_android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Download release artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: release-assets-*
        path: release-assets
        merge-multiple: true

    - name: Verify downloaded release artifacts
      shell: bash
      run: |
        set -euo pipefail
        find release-assets -type f \( -name '*.zip' -o -name '*.apk' \) | sort
        test -f "release-assets/${{ needs.metadata.outputs.game_apk_android }}"

    - name: Generate Commit Log
      id: changelog
      shell: pwsh
      run: |
        $log = git log -n 10 --pretty=format:"* %h - %s (%an)"
        "COMMIT_LOG<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        $log | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Update Tag
      shell: bash
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git tag -fa release-build -m "Latest Release Build"
        git push -f origin release-build

    - name: Clean Existing Release Assets
      uses: actions/github-script@v7
      with:
        script: |
          const tag = "release-build";
          let release;
          try {
            const releaseResponse = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            });
            release = releaseResponse.data;
          } catch (error) {
            if (error.status === 404) {
              core.info(`Release '${tag}' does not exist yet. Skipping asset cleanup.`);
              return;
            }
            throw error;
          }

          const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: release.id,
            per_page: 100
          });

          for (const asset of assets) {
            core.info(`Deleting old release asset: ${asset.name}`);
            await github.rest.repos.deleteReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              asset_id: asset.id
            });
          }

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: release-build
        name: Release Build v${{ needs.metadata.outputs.version }}
        body: |
          Game version: ${{ needs.metadata.outputs.version }}
          Server version: ${{ needs.metadata.outputs.server_version }}

          ### Game Changes
          ${{ needs.metadata.outputs.changes_md }}

          ### Server Changes
          ${{ needs.metadata.outputs.server_changes_md }}

          ### Recent Commits
          ${{ steps.changelog.outputs.COMMIT_LOG }}
          
          ---
          *Build from commit ${{ github.sha }}*
        draft: false
        prerelease: false
        files: |
          release-assets/**/*.zip
          release-assets/**/*.apk
