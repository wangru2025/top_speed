name: Release Build

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - ".gitignore"

jobs:
  metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_info.outputs.version }}
      server_version: ${{ steps.release_info.outputs.server_version }}
      game_zip_win: ${{ steps.release_info.outputs.game_zip_win }}
      game_zip_linux: ${{ steps.release_info.outputs.game_zip_linux }}
      game_zip_mac_x64: ${{ steps.release_info.outputs.game_zip_mac_x64 }}
      game_zip_mac_arm64: ${{ steps.release_info.outputs.game_zip_mac_arm64 }}
      game_apk_android_arm64: ${{ steps.release_info.outputs.game_apk_android_arm64 }}
      game_apk_android_arm32: ${{ steps.release_info.outputs.game_apk_android_arm32 }}
      game_ipa_ios_arm64: ${{ steps.release_info.outputs.game_ipa_ios_arm64 }}
      android_version_code: ${{ steps.release_info.outputs.android_version_code }}
      changes_md: ${{ steps.release_info.outputs.changes_md }}
      server_changes_md: ${{ steps.release_info.outputs.server_changes_md }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Read Release Info
        id: release_info
        shell: pwsh
        run: |
          $infoPath = Join-Path $env:GITHUB_WORKSPACE "info.json"
          if (-not (Test-Path $infoPath)) {
            throw "info.json was not found at repository root."
          }

          $rawInfo = Get-Content -LiteralPath $infoPath -Raw -Encoding UTF8
          if ([string]::IsNullOrWhiteSpace($rawInfo)) {
            throw "info.json is empty."
          }

          # Strip BOM / zero-width prefix characters that can break ConvertFrom-Json on some runners.
          $rawInfo = $rawInfo.TrimStart([char]0xFEFF, [char]0x200B).Trim()

          try {
            $info = $rawInfo | ConvertFrom-Json -ErrorAction Stop
          } catch {
            $previewLength = [Math]::Min(220, $rawInfo.Length)
            $preview = $rawInfo.Substring(0, $previewLength).Replace("`r", "\r").Replace("`n", "\n")
            throw "Failed to parse info.json as JSON. $($_.Exception.Message) Preview: $preview"
          }
          if ($null -eq $info.version -or [string]::IsNullOrWhiteSpace([string]$info.version)) {
            throw "info.json is missing a valid 'version' value."
          }
          if ($null -eq $info.serverVersion -or [string]::IsNullOrWhiteSpace([string]$info.serverVersion)) {
            throw "info.json is missing a valid 'serverVersion' value."
          }

          $version = ([string]$info.version).Trim()
          $serverVersion = ([string]$info.serverVersion).Trim()
          if ($version -notmatch '^\d{4}\.\d{1,2}\.\d{1,2}\.\d{1,3}$') {
            throw "info.json version '$version' is invalid. Expected format: YYYY.M.D.R"
          }
          if ($serverVersion -notmatch '^\d{4}\.\d{1,2}\.\d{1,2}\.\d{1,3}$') {
            throw "info.json serverVersion '$serverVersion' is invalid. Expected format: YYYY.M.D.R"
          }

          $versionParts = $version.Split('.')
          $androidVersionCode =
            ([int]$versionParts[0] * 1000000) +
            ([int]$versionParts[1] * 10000) +
            ([int]$versionParts[2] * 100) +
            [int]$versionParts[3]

          $changes = @()
          if ($null -ne $info.changes) {
            foreach ($change in $info.changes) {
              $line = [string]$change
              if (-not [string]::IsNullOrWhiteSpace($line)) {
                $changes += "* $($line.Trim())"
              }
            }
          }
          if ($changes.Count -eq 0) {
            $changes += "* No listed game changes."
          }

          $serverChanges = @()
          if ($null -ne $info.serverChanges) {
            foreach ($change in $info.serverChanges) {
              $line = [string]$change
              if (-not [string]::IsNullOrWhiteSpace($line)) {
                $serverChanges += "* $($line.Trim())"
              }
            }
          }
          if ($serverChanges.Count -eq 0) {
            $serverChanges += "* No listed server changes."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "server_version=$serverVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "game_zip_win=TopSpeed-windows-x64-Release-v-$version.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "game_zip_linux=TopSpeed-linux-x64-Release-v-$version.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "game_zip_mac_x64=TopSpeed-mac-x64-Release-v-$version.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "game_zip_mac_arm64=TopSpeed-mac-arm64-Release-v-$version.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "game_apk_android_arm64=TopSpeed-android-arm64-Release-v-$version.apk" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "game_apk_android_arm32=TopSpeed-android-arm-Release-v-$version.apk" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "game_ipa_ios_arm64=TopSpeed-ios-arm64-Release-v-$version.ipa" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "android_version_code=$androidVersionCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "changes_md<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $changes | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "server_changes_md<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $serverChanges | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  build_windows:
    name: Build Windows ${{ matrix.target_name }}
    needs: metadata
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: Game win-x64
            kind: game
            artifact_name: release-assets-game-win-x64
          - target_name: Server win-x64
            kind: server
            publish_profile: ReleaseWinX64
            publish_dir: win-x64
            server_tag: win-x64
            artifact_name: release-assets-server-win-x64
    defaults:
      run:
        working-directory: top_speed_net
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          dotnet-version: 10.0.x
          python-version: "3.x"
          install-python-deps: "true"
          python-packages: markdown
          install-java: "false"
          java-version: "21"

      - name: Build and package Windows target
        id: package_windows
        shell: pwsh
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          SERVER_VERSION: ${{ needs.metadata.outputs.server_version }}
        run: |
          $kind = "${{ matrix.kind }}"

          if ($kind -eq "game") {
            dotnet restore TopSpeed/TopSpeed.csproj -p:RuntimeIdentifier=win-x64
            dotnet restore TopSpeed.Tests/TopSpeed.Tests.csproj
            dotnet build TopSpeed.Tests/TopSpeed.Tests.csproj --configuration Release --framework net10.0-windows --no-restore
            dotnet test TopSpeed.Tests/TopSpeed.Tests.csproj --configuration Release --framework net10.0-windows --no-build --verbosity normal
            dotnet build TopSpeed/TopSpeed.csproj --configuration Release --framework net10.0-windows --runtime win-x64 --no-restore

            $zipName = "TopSpeed-windows-x64-Release-v-$env:VERSION.zip"
            if (Test-Path $zipName) { Remove-Item $zipName -Force }
            Compress-Archive -Path "TopSpeed\bin\Release\net10.0\win-x64\*" -DestinationPath $zipName -CompressionLevel Optimal
            python scripts/build/verify_docs.py --archive $zipName --prefix docs
          } elseif ($kind -eq "server") {
            dotnet restore TopSpeed.Server/TopSpeed.Server.csproj
            dotnet publish TopSpeed.Server/TopSpeed.Server.csproj --configuration Release -p:ServerPublishProfile=${{ matrix.publish_profile }} -p:UseNativeAotUpdater=false -p:UseTrimmedUpdater=false

            $zipName = "TopSpeed.Server-${{ matrix.server_tag }}-Release-v-$env:SERVER_VERSION.zip"
            if (Test-Path $zipName) { Remove-Item $zipName -Force }
            Compress-Archive -Path "TopSpeed.Server\bin\Publish\${{ matrix.publish_dir }}\*" -DestinationPath $zipName -CompressionLevel Optimal
          } else {
            throw "Unknown Windows matrix kind '$kind'."
          }

          "artifact_paths<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "top_speed_net/$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ steps.package_windows.outputs.artifact_paths }}

  build_mac:
    name: Build macOS ${{ matrix.target_name }}
    needs: metadata
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: Game mac-x64
            kind: game
            runtime_id: osx-x64
            game_arch_tag: x64
            artifact_name: release-assets-game-mac-x64
          - target_name: Game mac-arm64
            kind: game
            runtime_id: osx-arm64
            game_arch_tag: arm64
            artifact_name: release-assets-game-mac-arm64
          - target_name: Server mac-x64
            kind: server
            publish_profile: ReleaseMacX64
            publish_dir: mac-x64
            server_tag: mac-x64
            artifact_name: release-assets-server-mac-x64
          - target_name: Server mac-arm64
            kind: server
            publish_profile: ReleaseMacArm64
            publish_dir: mac-arm64
            server_tag: mac-arm64
            artifact_name: release-assets-server-mac-arm64
    defaults:
      run:
        working-directory: top_speed_net
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          dotnet-version: 10.0.x
          python-version: "3.x"
          install-python-deps: "true"
          python-packages: markdown
          install-java: "false"
          java-version: "21"

      - name: Build and package macOS target
        id: package_mac
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          SERVER_VERSION: ${{ needs.metadata.outputs.server_version }}
        run: |
          set -euo pipefail

          kind="${{ matrix.kind }}"
          if [[ "$kind" == "game" ]]; then
            rid="${{ matrix.runtime_id }}"
            zip_name="TopSpeed-mac-${{ matrix.game_arch_tag }}-Release-v-$VERSION.zip"

            dotnet restore TopSpeed/TopSpeed.csproj -p:RuntimeIdentifier="$rid"
            dotnet publish TopSpeed/TopSpeed.csproj --configuration Release --framework net10.0 --runtime "$rid" -p:UseNativeAotUpdater=true -p:UseTrimmedUpdater=false --no-restore

            rm -f "$zip_name"
            (
              cd "TopSpeed/bin/Publish/$rid"
              /usr/bin/ditto -c -k --sequesterRsrc --keepParent TopSpeed.app "$GITHUB_WORKSPACE/top_speed_net/$zip_name"
            )
            python scripts/build/verify_docs.py --archive "$zip_name" --prefix TopSpeed.app/Contents/MacOS/docs
          elif [[ "$kind" == "server" ]]; then
            profile="${{ matrix.publish_profile }}"
            publish_dir="${{ matrix.publish_dir }}"
            zip_name="TopSpeed.Server-${{ matrix.server_tag }}-Release-v-$SERVER_VERSION.zip"

            dotnet restore TopSpeed.Server/TopSpeed.Server.csproj
            dotnet publish TopSpeed.Server/TopSpeed.Server.csproj --configuration Release -p:ServerPublishProfile="$profile" -p:UseNativeAotUpdater=true -p:UseTrimmedUpdater=false

            rm -f "$zip_name"
            (
              cd "TopSpeed.Server/bin/Publish/$publish_dir"
              zip -rq "$GITHUB_WORKSPACE/top_speed_net/$zip_name" .
            )
          else
            echo "Unknown macOS matrix kind '$kind'." >&2
            exit 1
          fi

          {
            echo "artifact_paths<<EOF"
            echo "top_speed_net/$zip_name"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ steps.package_mac.outputs.artifact_paths }}

  build_linux:
    name: Build Linux ${{ matrix.target_name }}
    needs: metadata
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: Game linux-x64
            kind: game
            artifact_name: release-assets-game-linux-x64
          - target_name: Server linux-x64
            kind: server
            publish_profile: ReleaseLinuxX64
            publish_dir: linux-x64
            server_tag: linux-x64
            artifact_name: release-assets-server-linux-x64
          - target_name: Server linux-arm64
            kind: server
            publish_profile: ReleaseLinuxArm64
            publish_dir: linux-arm64
            server_tag: linux-arm64
            artifact_name: release-assets-server-linux-arm64
          - target_name: Server linux-arm32
            kind: server
            publish_profile: ReleaseLinuxArm32
            publish_dir: linux-arm32
            server_tag: linux-arm32
            artifact_name: release-assets-server-linux-arm32
          - target_name: Server linux-musl-x64
            kind: server
            publish_profile: ReleaseLinuxMuslX64
            publish_dir: linux-musl-x64
            server_tag: linux-musl-x64
            artifact_name: release-assets-server-linux-musl-x64
          - target_name: Server linux-musl-arm64
            kind: server
            publish_profile: ReleaseLinuxMuslArm64
            publish_dir: linux-musl-arm64
            server_tag: linux-musl-arm64
            artifact_name: release-assets-server-linux-musl-arm64
          - target_name: Server linux-x86-fdd
            kind: server
            publish_profile: ReleaseLinuxX86FrameworkDependent
            publish_dir: linux-x86-fdd
            server_tag: linux-x86-fdd
            artifact_name: release-assets-server-linux-x86-fdd
    defaults:
      run:
        working-directory: top_speed_net
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          dotnet-version: 10.0.x
          python-version: "3.x"
          install-python-deps: "true"
          python-packages: markdown
          install-java: "false"
          java-version: "21"

      - name: Build and package Linux target
        id: package_linux
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          SERVER_VERSION: ${{ needs.metadata.outputs.server_version }}
        run: |
          set -euo pipefail

          kind="${{ matrix.kind }}"
          if [[ "$kind" == "game" ]]; then
            zip_name="TopSpeed-linux-x64-Release-v-$VERSION.zip"

            dotnet restore TopSpeed/TopSpeed.csproj -p:RuntimeIdentifier=linux-x64
            dotnet build TopSpeed/TopSpeed.csproj --configuration Release --framework net10.0 --runtime linux-x64 -p:UseNativeAotUpdater=false -p:UseTrimmedUpdater=true --no-restore

            rm -f "$zip_name"
            (
              cd TopSpeed/bin/Release/net10.0/linux-x64
              zip -rq "$GITHUB_WORKSPACE/top_speed_net/$zip_name" .
            )
            python scripts/build/verify_docs.py --archive "$zip_name" --prefix docs
          elif [[ "$kind" == "server" ]]; then
            profile="${{ matrix.publish_profile }}"
            publish_dir="${{ matrix.publish_dir }}"
            zip_name="TopSpeed.Server-${{ matrix.server_tag }}-Release-v-$SERVER_VERSION.zip"

            dotnet restore TopSpeed.Server/TopSpeed.Server.csproj
            dotnet publish TopSpeed.Server/TopSpeed.Server.csproj --configuration Release -p:ServerPublishProfile="$profile" -p:UseNativeAotUpdater=false -p:UseTrimmedUpdater=true

            rm -f "$zip_name"
            (
              cd "TopSpeed.Server/bin/Publish/$publish_dir"
              zip -rq "$GITHUB_WORKSPACE/top_speed_net/$zip_name" .
            )
          else
            echo "Unknown Linux matrix kind '$kind'." >&2
            exit 1
          fi

          {
            echo "artifact_paths<<EOF"
            echo "top_speed_net/$zip_name"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ steps.package_linux.outputs.artifact_paths }}

  build_android:
    name: Build Android ${{ matrix.target_name }}
    needs: metadata
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: android-arm64
            runtime_id: android-arm64
            artifact_name: release-assets-android-arm64
          - target_name: android-arm
            runtime_id: android-arm
            artifact_name: release-assets-android-arm
    defaults:
      run:
        working-directory: top_speed_net
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          dotnet-version: 10.0.x
          python-version: "3.x"
          install-python-deps: "true"
          python-packages: markdown
          install-java: "true"
          java-version: "21"

      - name: Install Android workload
        run: dotnet workload install android

      - name: Prepare Android signing keystore
        shell: pwsh
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ANDROID_KEYSTORE_B64)) {
            throw "Missing required secret ANDROID_KEYSTORE_B64."
          }

          $keystorePath = Join-Path $PWD "TopSpeed.Android/top_speed.p12"
          [System.IO.File]::WriteAllBytes($keystorePath, [System.Convert]::FromBase64String($env:ANDROID_KEYSTORE_B64))

      - name: Build and package Android target
        id: package_android
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          ANDROID_VERSION_CODE: ${{ needs.metadata.outputs.android_version_code }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: |
          set -euo pipefail

          if [[ -z "${ANDROID_KEY_PASS:-}" ]]; then
            echo "Missing Android signing password secret ANDROID_KEY_PASS." >&2
            exit 1
          fi

          rid="${{ matrix.runtime_id }}"
          dotnet restore TopSpeed.Android/TopSpeed.Android.csproj
          dotnet publish TopSpeed.Android/TopSpeed.Android.csproj \
            --configuration Release \
            --framework net10.0-android \
            --runtime "$rid" \
            -p:AndroidPackageFormat=apk \
            -p:ApplicationDisplayVersion="$VERSION" \
            -p:ApplicationVersion="$ANDROID_VERSION_CODE"

          if [[ "$rid" == "android-arm64" ]]; then
            apk_name="TopSpeed-android-arm64-Release-v-$VERSION.apk"
          else
            apk_name="TopSpeed-android-arm-Release-v-$VERSION.apk"
          fi

          rid_root="TopSpeed.Android/bin/Release/net10.0-android/$rid"
          apk_path="$(find "$rid_root" -type f -name '*Signed.apk' | sort | head -n 1)"
          if [[ -z "$apk_path" ]]; then
            apk_path="$(find "$rid_root" -type f -name '*.apk' ! -name '*unaligned*' | sort | head -n 1)"
          fi
          if [[ -z "$apk_path" ]]; then
            echo "No APK produced for runtime '$rid'." >&2
            exit 1
          fi

          cp "$apk_path" "$apk_name"
          python scripts/build/verify_docs.py --archive "$apk_name" --prefix assets/docs

          {
            echo "artifact_paths<<EOF"
            echo "top_speed_net/$apk_name"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ steps.package_android.outputs.artifact_paths }}

  build_ios:
    name: Build iOS ${{ matrix.target_name }}
    needs: metadata
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: arm64
            runtime_id: ios-arm64
            required_xcode: "26.3"
            workload_set_version: "10.0.203"
            artifact_name: release-assets-ios-arm64
    defaults:
      run:
        working-directory: top_speed_net
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          dotnet-version: 10.0.x
          python-version: "3.x"
          install-python-deps: "true"
          python-packages: markdown
          install-java: "false"
          java-version: "21"

      - name: Select required Xcode
        shell: bash
        run: |
          set -euo pipefail

          exact_dot_zero="/Applications/Xcode_${{ matrix.required_xcode }}.0.app"
          exact_plain="/Applications/Xcode_${{ matrix.required_xcode }}.app"
          xcode_path=""

          if [[ -d "$exact_plain" ]]; then
            xcode_path="$exact_plain"
          elif [[ -d "$exact_dot_zero" ]]; then
            xcode_path="$exact_dot_zero"
          else
            xcode_path="$(ls -d /Applications/Xcode_${{ matrix.required_xcode }}*.app 2>/dev/null | grep -viE 'beta|rc|release_candidate' | sort -V | tail -n 1 || true)"
            if [[ -z "$xcode_path" ]]; then
              xcode_path="$(ls -d /Applications/Xcode_${{ matrix.required_xcode }}*.app 2>/dev/null | sort -V | tail -n 1 || true)"
            fi
          fi

          if [[ -z "$xcode_path" ]]; then
            echo "Required Xcode ${{ matrix.required_xcode }} was not found." >&2
            echo "Installed Xcode apps:" >&2
            ls -1 /Applications | grep '^Xcode' | sort >&2 || true
            exit 1
          fi

          canonical_xcode_path="$(python3 -c 'import os,sys; print(os.path.realpath(sys.argv[1]))' "$xcode_path")"
          plain_xcode_path="$exact_plain"
          echo "Selected Xcode path: $xcode_path"
          echo "Canonical Xcode path: $canonical_xcode_path"
          if [[ ! -d "$plain_xcode_path" ]]; then
            echo "Creating canonical plain Xcode path '$plain_xcode_path' -> '$canonical_xcode_path'"
            if [[ -e "$plain_xcode_path" && ! -d "$plain_xcode_path" ]]; then
              sudo rm -f "$plain_xcode_path"
            fi
            sudo ln -s "$canonical_xcode_path" "$plain_xcode_path"
          fi

          developer_dir="$plain_xcode_path/Contents/Developer"
          sudo xcode-select -s "$developer_dir"
          xcodebuild -version

          # .NET iOS 26.2 workloads sometimes resolve Xcode as /Applications/Xcode_<ver>.0.app.
          # Ensure that alias exists to avoid xcrun clang++ lookup failures.
          xcode_alias_path="/Applications/Xcode_${{ matrix.required_xcode }}.0.app"
          if [[ ! -e "$xcode_alias_path" ]]; then
            echo "Creating Xcode alias '$xcode_alias_path' -> '$plain_xcode_path'"
            sudo ln -s "$plain_xcode_path" "$xcode_alias_path"
          fi

          alias_developer_dir="$xcode_alias_path/Contents/Developer"

          macos_sdk_dir="$developer_dir/Platforms/MacOSX.platform/Developer/SDKs"
          if [[ ! -e "$macos_sdk_dir/MacOSX.sdk" ]]; then
            latest_macos_sdk="$(ls -d "$macos_sdk_dir"/MacOSX*.sdk 2>/dev/null | sort -V | tail -n 1 || true)"
            if [[ -z "$latest_macos_sdk" ]]; then
              echo "No MacOSX*.sdk found in '$macos_sdk_dir'." >&2
              exit 1
            fi
            echo "MacOSX.sdk alias is missing; creating symlink to '$latest_macos_sdk'."
            sudo ln -s "$latest_macos_sdk" "$macos_sdk_dir/MacOSX.sdk"
          fi

          alias_macos_sdk_dir="$alias_developer_dir/Platforms/MacOSX.platform/Developer/SDKs"
          if [[ -d "$alias_macos_sdk_dir" && ! -e "$alias_macos_sdk_dir/MacOSX.sdk" ]]; then
            alias_latest_macos_sdk="$(ls -d "$alias_macos_sdk_dir"/MacOSX*.sdk 2>/dev/null | sort -V | tail -n 1 || true)"
            if [[ -n "$alias_latest_macos_sdk" ]]; then
              echo "Alias MacOSX.sdk is missing; creating symlink to '$alias_latest_macos_sdk'."
              sudo ln -s "$alias_latest_macos_sdk" "$alias_macos_sdk_dir/MacOSX.sdk"
            fi
          fi

          "$developer_dir/usr/bin/xcodebuild" -sdk "$macos_sdk_dir/MacOSX.sdk" -find clang++
          "$alias_developer_dir/usr/bin/xcodebuild" -sdk "$alias_macos_sdk_dir/MacOSX.sdk" -find clang++
          ls -ld "$plain_xcode_path" "$xcode_alias_path"
          /usr/bin/xcrun --kill-cache || true
          /usr/bin/xcrun --find clang++

          # .NET iOS/Mac build selection checks can prefer stale Settings.plist paths.
          rm -f "$HOME/Library/Preferences/Xamarin/Settings.plist" || true
          rm -f "$HOME/Library/Preferences/maui/Settings.plist" || true

          # Force .NET/Xamarin target resolution to this exact Xcode.
          echo "DEVELOPER_DIR=$developer_dir" >> "$GITHUB_ENV"
          echo "MD_APPLE_SDK_ROOT=$plain_xcode_path" >> "$GITHUB_ENV"
          echo "xcrun_nocache=true" >> "$GITHUB_ENV"

      - name: Install iOS workload set
        run: dotnet workload install ios --version ${{ matrix.workload_set_version }}

      - name: Print iOS toolchain versions
        shell: bash
        run: |
          set -euo pipefail
          dotnet --info
          dotnet workload --info
          xcrun --sdk iphoneos --show-sdk-version
          xcrun clang --version
          xcrun ld -v

      - name: Validate native iOS dependencies
        shell: bash
        run: |
          set -euo pipefail

          prism="TopSpeed/ThirdParty/ios/libprism.a"
          phonon="TopSpeed/ThirdParty/ios/libphonon.a"
          sdl_framework="TopSpeed/ThirdParty/ios/SDL3.xcframework/ios-arm64/SDL3.framework/SDL3"
          miniaudio_framework="SoundFlow/Src/Backends/MiniAudio/runtimes/ios-arm64/native/miniaudio.framework/miniaudio"
          ffmpeg_framework="SoundFlow/Codecs/SoundFlow.Codecs.FFMpeg/runtimes/ios-arm64/native/soundflow-ffmpeg.framework/soundflow-ffmpeg"

          for dep in "$prism" "$phonon" "$sdl_framework" "$miniaudio_framework" "$ffmpeg_framework"; do
            test -f "$dep"
            file "$dep"
          done

      - name: Build and package iOS target
        id: package_ios
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p artifacts/ios

          dotnet restore TopSpeed.iOS/TopSpeed.iOS.csproj -p:RuntimeIdentifier=${{ matrix.runtime_id }}
          dotnet publish TopSpeed.iOS/TopSpeed.iOS.csproj \
            --configuration Release \
            --framework net10.0-ios \
            --runtime ${{ matrix.runtime_id }} \
            -p:ArchiveOnBuild=false \
            -p:BuildIpa=false \
            -p:EnableCodeSigning=false \
            -bl:artifacts/ios/ios-publish.binlog

          ipa_name="TopSpeed-ios-arm64-Release-v-$VERSION.ipa"
          app_publish_dir="TopSpeed.iOS/bin/Release/net10.0-ios/${{ matrix.runtime_id }}/publish"
          app_source="$(find "$app_publish_dir" -maxdepth 1 -type d -name '*.app' | sort | head -n 1 || true)"
          if [[ -z "$app_source" ]]; then
            app_source="$(find TopSpeed.iOS/bin/Release/net10.0-ios -type d -name '*.app' | sort | head -n 1 || true)"
          fi
          if [[ -z "$app_source" ]]; then
            echo "No .app bundle produced for runtime '${{ matrix.runtime_id }}'." >&2
            exit 1
          fi

          rm -f "$ipa_name"
          package_dir="$(mktemp -d)"
          mkdir -p "$package_dir/Payload"
          # Use a stable app bundle name without extra dots for AltStore compatibility.
          /usr/bin/ditto "$app_source" "$package_dir/Payload/TopSpeed.app"
          (
            cd "$package_dir"
            /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload "$GITHUB_WORKSPACE/top_speed_net/$ipa_name"
          )
          rm -rf "$package_dir"

          verify_extract_dir="$(mktemp -d)"
          unzip -qq "$ipa_name" -d "$verify_extract_dir"
          app_dir="$(find "$verify_extract_dir/Payload" -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [[ -z "$app_dir" ]]; then
            echo "IPA does not contain a valid .app bundle in Payload/." >&2
            exit 1
          fi
          test -f "$app_dir/Frameworks/miniaudio.framework/miniaudio"
          test -f "$app_dir/Frameworks/soundflow-ffmpeg.framework/soundflow-ffmpeg"
          test -f "$app_dir/Frameworks/SDL3.framework/SDL3"
          app_bundle_name="$(basename "$app_dir")"
          python scripts/build/verify_docs.py --archive "$ipa_name" --prefix "Payload/$app_bundle_name/docs"
          rm -rf "$verify_extract_dir"

          {
            echo "artifact_paths<<EOF"
            echo "top_speed_net/$ipa_name"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ steps.package_ios.outputs.artifact_paths }}

      - name: Upload iOS diagnostics artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: ios-diagnostics-${{ matrix.target_name }}
          if-no-files-found: warn
          path: |
            top_speed_net/artifacts/ios/*.binlog

      # Signing path (kept commented for later use):
      # - name: Prepare iOS signing certificate
      #   shell: bash
      #   env:
      #     IOS_CERT_P12_B64: ${{ secrets.IOS_CERT_P12_B64 }}
      #     IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
      #   run: |
      #     set -euo pipefail
      #     echo "$IOS_CERT_P12_B64" | base64 --decode > ios-signing-cert.p12
      #     security create-keychain -p "" build.keychain
      #     security default-keychain -s build.keychain
      #     security unlock-keychain -p "" build.keychain
      #     security import ios-signing-cert.p12 -k build.keychain -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      # - name: Install iOS provisioning profile
      #   shell: bash
      #   env:
      #     IOS_PROVISION_B64: ${{ secrets.IOS_PROVISION_B64 }}
      #   run: |
      #     set -euo pipefail
      #     mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
      #     echo "$IOS_PROVISION_B64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/top_speed.mobileprovision"

      # - name: Sign IPA
      #   run: |
      #     echo "Signing implementation goes here."

  release:
    name: Publish Release
    needs:
      - metadata
      - build_windows
      - build_mac
      - build_linux
      - build_android
      - build_ios
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Verify downloaded release artifacts
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -type f \( -name '*.zip' -o -name '*.apk' -o -name '*.ipa' \) | sort
          test -f "release-assets/${{ needs.metadata.outputs.game_zip_win }}"
          test -f "release-assets/${{ needs.metadata.outputs.game_zip_linux }}"
          test -f "release-assets/${{ needs.metadata.outputs.game_zip_mac_x64 }}"
          test -f "release-assets/${{ needs.metadata.outputs.game_zip_mac_arm64 }}"
          test -f "release-assets/${{ needs.metadata.outputs.game_apk_android_arm64 }}"
          test -f "release-assets/${{ needs.metadata.outputs.game_apk_android_arm32 }}"
          test -f "release-assets/${{ needs.metadata.outputs.game_ipa_ios_arm64 }}"
          test -f "release-assets/TopSpeed.Server-win-x64-Release-v-${{ needs.metadata.outputs.server_version }}.zip"
          test -f "release-assets/TopSpeed.Server-linux-x64-Release-v-${{ needs.metadata.outputs.server_version }}.zip"
          test -f "release-assets/TopSpeed.Server-linux-arm64-Release-v-${{ needs.metadata.outputs.server_version }}.zip"
          test -f "release-assets/TopSpeed.Server-linux-arm32-Release-v-${{ needs.metadata.outputs.server_version }}.zip"
          test -f "release-assets/TopSpeed.Server-linux-musl-x64-Release-v-${{ needs.metadata.outputs.server_version }}.zip"
          test -f "release-assets/TopSpeed.Server-linux-musl-arm64-Release-v-${{ needs.metadata.outputs.server_version }}.zip"
          test -f "release-assets/TopSpeed.Server-linux-x86-fdd-Release-v-${{ needs.metadata.outputs.server_version }}.zip"
          test -f "release-assets/TopSpeed.Server-mac-x64-Release-v-${{ needs.metadata.outputs.server_version }}.zip"
          test -f "release-assets/TopSpeed.Server-mac-arm64-Release-v-${{ needs.metadata.outputs.server_version }}.zip"

      - name: Generate Commit Log
        id: changelog
        shell: pwsh
        run: |
          $log = git log -n 10 --pretty=format:"* %h - %s (%an)"
          "COMMIT_LOG<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $log | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Update Tag
        shell: bash
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git tag -fa release-build -m "Latest Release Build"
          git push -f origin release-build

      - name: Clean Existing Release Assets
        uses: actions/github-script@v8
        with:
          script: |
            const tag = "release-build";
            let release;
            try {
              const releaseResponse = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              release = releaseResponse.data;
            } catch (error) {
              if (error.status === 404) {
                core.info(`Release '${tag}' does not exist yet. Skipping asset cleanup.`);
                return;
              }
              throw error;
            }

            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              per_page: 100
            });

            for (const asset of assets) {
              core.info(`Deleting old release asset: ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id
              });
            }

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release-build
          name: Release Build v${{ needs.metadata.outputs.version }}
          body: |
            Game version: ${{ needs.metadata.outputs.version }}
            Server version: ${{ needs.metadata.outputs.server_version }}

            ### Game Changes
            ${{ needs.metadata.outputs.changes_md }}

            ### Server Changes
            ${{ needs.metadata.outputs.server_changes_md }}

            ### Recent Commits
            ${{ steps.changelog.outputs.COMMIT_LOG }}

            ---
            *Build from commit ${{ github.sha }}*
          draft: false
          prerelease: false
          files: |
            release-assets/**/*.zip
            release-assets/**/*.apk
            release-assets/**/*.ipa
