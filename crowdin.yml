project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: .
preserve_hierarchy: true

files:
  - source: /top_speed_net/languages/client/messages.pot
    translation: /top_speed_net/languages/client/%locale%/messages.po
    skip_untranslated_strings: false
    languages_mapping:
      locale:
        zh-CN: zh-cn
        es-ES: es
        vi: vi

  - source: /top_speed_net/languages/server/messages.pot
    translation: /top_speed_net/languages/server/%locale%/messages.po
    skip_untranslated_strings: false
    languages_mapping:
      locale:
        zh-CN: zh-cn
        es-ES: es
        vi: vi
